<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Open chevron arrow marker, auto-oriented -->
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6.3" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polyline points="0.7,0.7 6.3,3.5 0.7,6.3" stroke="black" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- x-axis at y=10 (tanh y=0) -->
  <line x1="4" y1="10" x2="29" y2="10" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <!-- y-axis: from y=18 (kink bottom) up through origin, arrow upward -->
  <line x1="4" y1="18" x2="4" y2="1" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <!-- tanh kink: xc=17, sigma=1.3, yc=10, amp=8 -->
  <polyline points="4.0,18.00 13.0,17.97 14.0,17.84 14.5,17.67 15.0,17.29 15.5,16.55 16.0,15.17 16.5,12.93 17.0,10.00 17.5,7.07 18.0,4.83 18.5,3.45 19.0,2.71 19.5,2.33 20.0,2.16 20.5,2.07 21.0,2.03 30.0,2.00"
        stroke="#228B22" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- QMT label -->
  <text x="16" y="30.5" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-weight="700"
        font-size="12" fill="black" text-anchor="middle" letter-spacing="0.5">QMT</text>
</svg>
