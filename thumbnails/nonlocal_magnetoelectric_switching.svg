<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Nonlocal magnetoelectric switching thumbnail</title>
  <desc id="desc">Stylized phase-field plot with a purple background, a vertical color scale, and a red switching wedge outlined in cyan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f1f8d"/>
      <stop offset="1" stop-color="#6123a5"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9f9f7"/>
      <stop offset="0.16" stop-color="#f3db60"/>
      <stop offset="0.34" stop-color="#ef9c3b"/>
      <stop offset="0.5" stop-color="#d64e36"/>
      <stop offset="0.66" stop-color="#59b4e7"/>
      <stop offset="0.82" stop-color="#6b53cf"/>
      <stop offset="1" stop-color="#fafafa"/>
    </linearGradient>
    <filter id="soften" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

  <rect width="320" height="320" fill="url(#bg)"/>

  <rect x="12" y="12" width="86" height="134" rx="3" fill="#fff" opacity="0.98"/>
  <text x="21" y="42" fill="#2b2441" font-family="Arial, Helvetica, sans-serif" font-size="29">P<tspan dy="8" font-size="19">y</tspan><tspan dy="-8" font-size="29">/P</tspan><tspan dy="8" font-size="19">0</tspan></text>
  <text x="21" y="78" fill="#2b2441" font-family="Arial, Helvetica, sans-serif" font-size="27">1</text>
  <text x="18" y="114" fill="#2b2441" font-family="Arial, Helvetica, sans-serif" font-size="27">0</text>
  <text x="13" y="140" fill="#2b2441" font-family="Arial, Helvetica, sans-serif" font-size="27">−1</text>
  <rect x="53" y="55" width="16" height="80" rx="2" fill="url(#heat)"/>
  <rect x="52" y="54" width="18" height="82" rx="2" fill="none" stroke="#d9d3df" stroke-width="1"/>

  <path
    d="M198 78
       C194 108 186 156 176 304
       L258 304
       C294 304 312 271 312 231
       C311 193 293 158 276 124
       C261 95 245 76 234 62
       C221 65 208 69 198 78 Z"
    fill="#c54532"
    opacity="0.97"/>

  <path
    d="M198 78
       C194 108 186 156 176 304
       M198 78
       C210 78 221 77 234 76
       C250 111 268 152 284 192
       C300 230 307 269 258 304"
    fill="none"
    stroke="#87d8ff"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#soften)"/>

  <path
    d="M192 85
       C221 88 250 87 288 83"
    fill="none"
    stroke="#6fd8ff"
    stroke-width="3.5"
    stroke-linecap="round"
    opacity="0.7"
    filter="url(#soften)"/>

  <path
    d="M183 260
       C212 258 239 262 264 270"
    fill="none"
    stroke="#d56d62"
    stroke-width="3"
    opacity="0.35"/>
</svg>
